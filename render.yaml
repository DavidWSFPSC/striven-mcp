services:
  # Flask API — serves all endpoints including /search-estimates
  - type: web
    name: striven-mcp-v2
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: STRIVEN_CLIENT_ID
        sync: false
      - key: STRIVEN_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
