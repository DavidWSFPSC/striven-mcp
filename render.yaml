services:
  # Flask API — data layer (Striven + Supabase)
  - type: web
    name: striven-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: STRIVEN_CLIENT_ID
        sync: false
      - key: STRIVEN_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # MCP HTTP server — Claude.ai integration endpoint
  - type: web
    name: striven-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py --http
    envVars:
      - key: FLASK_API_URL
        value: https://striven-api.onrender.com
