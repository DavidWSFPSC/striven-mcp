services:
  # -----------------------------------------------------------------------
  # Service 1: Flask REST API — all data endpoints
  # -----------------------------------------------------------------------
  - type: web
    name: striven-mcp-v2
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # -----------------------------------------------------------------------
  # Service 2: MCP HTTP server — Claude.ai remote MCP integration
  # Endpoint: https://striven-mcp-server.onrender.com/mcp
  # -----------------------------------------------------------------------
  - type: web
    name: striven-mcp-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py
    envVars:
      - key: FLASK_API_URL
        value: https://striven-mcp-v2.onrender.com
