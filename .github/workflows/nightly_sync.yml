name: Nightly Striven → Supabase Sync

on:
  schedule:
    # 2:00 AM Eastern = 07:00 UTC (EST) / 06:00 UTC (EDT)
    # Running at 07:00 UTC covers both EST and EDT without a seasonal change.
    - cron: "0 7 * * *"
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  sync:
    name: Full data sync
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STRIVEN_CLIENT_ID:     ${{ secrets.STRIVEN_CLIENT_ID }}
      STRIVEN_CLIENT_SECRET: ${{ secrets.STRIVEN_CLIENT_SECRET }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Core data syncs ────────────────────────────────────────────────────

      - name: Sync estimates (includes materialized view refresh)
        run: python -c "from services.sync import sync_estimates_to_supabase; sync_estimates_to_supabase()"

      - name: Sync invoices
        run: python sync_invoices.py

      - name: Sync payments
        run: python sync_payments.py

      - name: Sync tasks
        run: python sync_tasks.py

      - name: Sync items (product catalog)
        run: python sync_items.py

      - name: Sync vendors
        run: python sync_vendors.py

      - name: Sync employees
        run: python sync_employees.py

      - name: Sync callbacks (detailed custom-field audit)
        run: python callback_audit.py
