name: Nightly Striven → Supabase Sync

on:
  schedule:
    # 2:00 AM Eastern = 07:00 UTC (EST) / 06:00 UTC (EDT)
    # Running at 07:00 UTC covers both EST and EDT without a seasonal change.
    - cron: "0 7 * * *"
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  sync:
    name: Trigger sync on Render
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # NOTE: All sync scripts now run on Render (stable IP, trusted by Striven).
    # GitHub Actions shared runner IPs are flagged by Striven's rate limiter on
    # all endpoints, so we fire a single HTTP trigger to the Render-hosted Flask
    # app which runs the sync asynchronously in a background thread.
    #
    # Required GitHub Actions secrets:
    #   SYNC_API_KEY — must match the SYNC_API_KEY env var set on the Render
    #                  service (striven-mcp-v2). Set this in:
    #                  GitHub → Settings → Secrets → Actions → New repository secret

    steps:
      - name: Trigger nightly sync on Render
        run: |
          curl -X POST https://striven-mcp-v2.onrender.com/admin/run-sync \
            -H "Authorization: Bearer ${{ secrets.SYNC_API_KEY }}" \
            -H "Content-Type: application/json" \
            --fail --max-time 30
