name: Monday Morning Digest → Notion

# Creates a weekly digest page in Notion every Monday at 8:00 AM ET.
# Calls /admin/send-weekly-digest on the Render-hosted Flask API, which runs
# query_weekly_digest() and creates a new page under NOTION_DIGEST_PAGE_ID.
#
# Required GitHub Actions secret:
#   SYNC_API_KEY — same key used by nightly sync (auth for Flask admin endpoints)
#
# Required Render env vars (striven-mcp-v2 → Environment):
#   NOTION_API_KEY        — Notion integration token
#   NOTION_DIGEST_PAGE_ID — 34ff2394ad6b8129bac1da9eedfef721

on:
  schedule:
    # 8:00 AM ET = 13:00 UTC (EST) / 12:00 UTC (EDT)
    # Running at 13:00 UTC covers both EST and EDT without seasonal adjustment.
    - cron: "0 13 * * 1"
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  send-digest:
    name: Send weekly digest to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send weekly digest
        run: |
          curl -X POST https://striven-mcp-v2.onrender.com/admin/send-weekly-digest \
            -H "Authorization: Bearer ${{ secrets.SYNC_API_KEY }}" \
            -H "Content-Type: application/json" \
            --fail --max-time 60
